# CI — runs on every push & PR. No secrets needed; gives you green checks that
# the types, the layering guardrails, and the formatting are all healthy.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run guardrails
      - run: npm run format:check
