# CI — runs on GitHub's servers on every push & PR (the "Actions" tab). No
# secrets needed; gives you green checks that the types, tests, layering
# guardrails, and formatting are all healthy.
name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run guardrails
      - run: npm run format:check
