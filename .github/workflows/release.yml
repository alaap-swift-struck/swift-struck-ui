# Release — publishes @swift-struck/ui to npm.
#
# How it works (the "live" channel):
#   1. You describe changes with `npm run changeset` (pick patch/minor/major).
#   2. On merge to main, this workflow opens a "Version Packages" PR.
#   3. Merge THAT PR → it publishes the new version to npm as `latest` (live).
#
# Staging (the `next` channel) is published manually — see DEPLOY.md.
#
# Requires one secret in the repo settings: NPM_TOKEN (an npm automation token).
name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
